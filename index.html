// ─── AI ───
async function askRN(apiKey, systemPrompt, messages) {
  if (!apiKey) return null;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:systemPrompt,messages}),
    });
    const data = await res.json();
    return data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()||null;
  } catch(e){console.error("RN AI error:",e);return null;}
}

function getInterviewPrompt(styleRules,sampleText){
  return `You are "Reliable Narrator" (RN), a warm, curious friend helping someone capture their week's stories from photos. Your primary mode is the RELIABLE NARRATOR — you push for honesty, specificity, and the real version of events.

PERSONALITY: You're a curious, perceptive friend. Warm but direct. You notice when someone is skating over the surface and you gently call it out. Brief, casual, never formulaic.

YOUR APPROACH:
- ALWAYS ask at least one follow-up question.
- Favor RELIABLE NARRATOR mode: "Is there a more honest version of this?" "What are you leaving out?" "You said that pretty casually — was it actually a bigger deal?"
- Also use FACT FINDER: "Who else was there?" "What happened right before this?"
- Also use MEANING MAKER: "Why did you take this photo specifically?" "What does this remind you of?"
- Keep questions to 1-2 sentences.
- After 3 follow-ups total, respond with DONE.
- If user says "that's it"/"nothing else"/"skip"/"next", respond with DONE.
${styleRules?`\nTHE WRITER'S STYLE:\n${styleRules}\n`:""}
CRITICAL: You MUST ask at least one follow-up for the first response. Do NOT respond with DONE on the first exchange.
Respond with EITHER a short follow-up question OR the word DONE. Nothing else.`;
}

function getRefinePrompt(styleRules,sampleText){
  return `You are "Reliable Narrator" (RN), a skilled editor who transforms raw spoken narrations into polished written prose.

CRITICAL RULES:
1. ACTIVELY REWRITE — restructure sentences, improve word choices, create better flow.
2. Merge facts and reflections into a cohesive narrative arc.
3. Write in first person. This is THEIR story, in THEIR voice — but elevated.
4. Remove all verbal tics, filler, repetition, and transcript artifacts.
5. Add transitions and connective tissue between ideas.
6. Keep personality, humor, and specific details.
7. Don't add facts or events that weren't mentioned.
8. Aim for 1-3 polished paragraphs per entry.
9. The result should feel like something the person would be PROUD to send to family.
${sampleText?`\nWRITING SAMPLES (match this voice):\n---\n${sampleText}\n---\n`:""}
${styleRules?`\nSTYLE RULES:\n${styleRules}\n`:""}
Output ONLY the refined text. No preamble, labels, or commentary.`;
}

// ─── Storage (localStorage) ───
const STORE_KEY="rn-session";
const SETTINGS_KEY="rn-settings";

function saveSession(data){try{localStorage.setItem(STORE_KEY,JSON.stringify(data));return true;}catch(e){console.error("Save failed:",e);return false;}}
function loadSession(){try{const s=localStorage.getItem(STORE_KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function saveSettingsLS(data){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(data));return true;}catch(e){return false;}}
function loadSettingsLS(){try{const s=localStorage.getItem(SETTINGS_KEY);return s?JSON.parse(s):null;}catch(e){return null;}}

// ─── Image compression ───
function compressImage(dataUrl,maxWidth=800,quality=0.7){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{const c=document.createElement("canvas");let w=img.width,h=img.height;if(w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",quality));};
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ═══════════ MAIN APP ═══════════
function ReliableNarrator(){
  const[photos,setPhotos]=useState([]);
  const[currentIndex,setCurrentIndex]=useState(0);
  const[dragActive,setDragActive]=useState(false);
  const[view,setView]=useState("loading");

  const[narrationData,setNarrationData]=useState({});
  const[inputText,setInputText]=useState("");
  const[aiThinking,setAiThinking]=useState(false);
  const[phase,setPhase]=useState("idle");

  const[refinedData,setRefinedData]=useState({});
  const[endorseIndex,setEndorseIndex]=useState(0);
  const[isEditing,setIsEditing]=useState(false);
  const[editText,setEditText]=useState("");

  const[tags,setTags]=useState({});
  const[tagIndex,setTagIndex]=useState(0);

  const[styleRules,setStyleRules]=useState("");
  const[sampleText,setSampleText]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[settingsDraft,setSettingsDraft]=useState({rules:"",samples:"",key:""});

  const[isRecording,setIsRecording]=useState(false);
  const[speechSupported,setSpeechSupported]=useState(false);

  const[copied,setCopied]=useState("");
  const[saveStatus,setSaveStatus]=useState(null);
  const[previousView,setPreviousView]=useState("upload");

  const fileInputRef=useRef(null);
  const addMoreInputRef=useRef(null);
  const textareaRef=useRef(null);
  const chatEndRef=useRef(null);
  const editRef=useRef(null);
  const saveTimerRef=useRef(null);
  const recognitionRef=useRef(null);

  const hasAI=!!apiKey;

  // ─── Init ───
  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR)setSpeechSupported(true);

    const settings=loadSettingsLS();
    if(settings){setStyleRules(settings.styleRules||"");setSampleText(settings.sampleText||"");setApiKey(settings.apiKey||"");}
    const session=loadSession();
    if(session&&session.photos?.length>0){
      setPhotos((session.photos||[]).map(p=>({...p,date:p.date?new Date(p.date):new Date()})));
      setNarrationData(session.narrationData||{});
      setRefinedData(session.refinedData||{});
      setTags(session.tags||{});
      setView(session.view&&session.view!=="loading"?session.view:"review");
      setCurrentIndex(session.currentIndex||0);
    } else { setView("upload"); }
  },[]);

  // ─── Auto-save ───
  useEffect(()=>{
    if(view==="loading")return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(async()=>{
      setSaveStatus("saving");
      const photosToSave=await Promise.all(photos.map(async(p)=>{
        let d=null;
        if(p.dataUrl){if(p.dataUrl.length<200000){d=p.dataUrl;}else{try{d=await compressImage(p.dataUrl,600,0.6);}catch(e){d=null;}}}
        return{...p,dataUrl:d,file:null};
      }));
      const ok=saveSession({photos:photosToSave,narrationData,refinedData,tags,view:["upload","review","viewer","endorse","tagging","output"].includes(view)?view:"review",currentIndex});
      setSaveStatus(ok?"saved":"error");
      setTimeout(()=>setSaveStatus(null),2000);
    },1500);
    return()=>{if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
  },[photos,narrationData,refinedData,tags,view,currentIndex]);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[narrationData,aiThinking]);

  useEffect(()=>{
    const id=photos[currentIndex]?.id;
    if(id&&narrationData[id]?.messages?.length>0){
      const last=narrationData[id].messages[narrationData[id].messages.length-1];
      if(last.from==="rn"&&!narrationData[id]?.done)setPhase("followup");
      else setPhase("open");
    }else setPhase("idle");
    setInputText("");
  },[currentIndex,photos]);

  useEffect(()=>{if((phase==="narrating"||phase==="followup"||phase==="open")&&textareaRef.current)setTimeout(()=>textareaRef.current?.focus(),100);},[phase]);
  useEffect(()=>{if(isEditing&&editRef.current)setTimeout(()=>editRef.current?.focus(),100);},[isEditing]);

  // ─── Helpers ───
  const curPid=()=>photos[currentIndex]?.id;
  const getData=(id)=>narrationData[id]||{messages:[],transcript:"",done:false};
  const narratedCount=photos.filter(p=>narrationData[p.id]?.done).length;
  const getNarrationStatus=(id)=>{const d=narrationData[id];if(!d)return"pending";if(d.done)return"done";if(d.messages.length>0)return"inprogress";return"pending";};
  const narratedPhotos=photos.filter(p=>narrationData[p.id]?.done);
  const endorsedCount=narratedPhotos.filter(p=>refinedData[p.id]?.endorsed).length;
  const taggedCount=narratedPhotos.filter(p=>tags[p.id]).length;
  const formatDate=(d)=>{if(!d||!d.getDay)return"";const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];const mos=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return`${days[d.getDay()]}, ${mos[d.getMonth()]} ${d.getDate()}`;};

  // ─── Speech ───
  const startSpeech=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    if(phase==="idle")setPhase("narrating");
    const recognition=new SR();recognition.continuous=true;recognition.interimResults=true;recognition.lang="en-US";
    let finalTranscript=inputText||"";
    recognition.onresult=(event)=>{let interim="";for(let i=event.resultIndex;i<event.results.length;i++){if(event.results[i].isFinal){finalTranscript+=event.results[i][0].transcript+" ";}else{interim+=event.results[i][0].transcript;}}setInputText(finalTranscript+interim);};
    recognition.onerror=(event)=>{if(event.error==="no-speech"){try{recognition.stop();}catch(e){}return;}setIsRecording(false);};
    recognition.onend=()=>{if(recognitionRef.current===recognition){try{recognition.start();}catch(e){setIsRecording(false);}}};
    recognitionRef.current=recognition;
    try{recognition.start();setIsRecording(true);}catch(e){console.error("Failed to start speech:",e);}
  };
  const stopSpeech=()=>{if(recognitionRef.current){const r=recognitionRef.current;recognitionRef.current=null;try{r.stop();}catch(e){}}setIsRecording(false);};
  const toggleSpeech=()=>{if(isRecording)stopSpeech();else startSpeech();};

  // ─── Narration ───
  const submitText=async()=>{
    const id=curPid();const text=inputText.trim();if(!id||!text)return;
    const cur=getData(id);
